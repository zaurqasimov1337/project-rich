name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @edusphere/shared build
      - run: pnpm --filter @edusphere/api db:generate
      - run: pnpm typecheck
      - run: pnpm --filter @edusphere/api test
      - run: pnpm build
        env:
          NEXT_TELEMETRY_DISABLED: '1'
